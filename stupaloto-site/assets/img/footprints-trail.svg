<svg xmlns="http://www.w3.org/2000/svg" width="200" height="90" viewBox="0 0 200 90" fill="none">
  <!-- Left foot (upper) -->
  <g transform="translate(50 30) rotate(-16)" fill="#58AD77" opacity="0.5">
    <ellipse cx="0" cy="5" rx="7" ry="11"/>
    <circle cx="-5.4" cy="-9.5" r="1.8"/>
    <circle cx="-1.6" cy="-11.6" r="2"/>
    <circle cx="2.2" cy="-11" r="1.9"/>
    <circle cx="5.6" cy="-8.8" r="1.6"/>
  </g>
  <!-- Right foot (lower), mirrored -->
  <g transform="translate(150 58) rotate(16) scale(-1 1)" fill="#58AD77" opacity="0.5">
    <ellipse cx="0" cy="5" rx="7" ry="11"/>
    <circle cx="-5.4" cy="-9.5" r="1.8"/>
    <circle cx="-1.6" cy="-11.6" r="2"/>
    <circle cx="2.2" cy="-11" r="1.9"/>
    <circle cx="5.6" cy="-8.8" r="1.6"/>
  </g>
</svg>
